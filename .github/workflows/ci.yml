# CI — rabbitmq-event-router.
# quality: ruff + mypy strict + unit (cov>=80%). integration: testcontainers (Docker).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ruff + mypy --strict + unit (cov ≥ 80%)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: mypy --strict
        run: uv run mypy
      - name: bandit (SAST)
        run: uv run bandit -q -r src
      - name: pytest unit + coverage
        run: uv run pytest tests/unit --cov-fail-under=80

  integration:
    name: Integration (RabbitMQ via testcontainers)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - name: pytest integration
        run: uv run pytest tests/integration --no-cov -v
