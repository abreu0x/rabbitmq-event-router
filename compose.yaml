# Ambiente de dev: broker + banco + a API admin.
#   docker compose up --build
#   # depois, aplicar as migrations no container admin:
#   docker compose run --rm admin uv run alembic upgrade head
services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: router
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: router
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://router:dev@postgres:5432/router
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
